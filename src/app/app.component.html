<div class="nc-app">

    <!-- ══════════════════════════════════════════════════════════════════ -->
    <!-- HEADER                                                             -->
    <!-- ══════════════════════════════════════════════════════════════════ -->
    <header class="nc-header">
        <div class="nc-header-inner">

            <!-- Brand -->
            <a routerLink="/" class="nc-brand">
                <div class="nc-brand-mark">
                    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="16" cy="16" r="16" fill="white" fill-opacity="0.15" />
                        <path d="M10 22 Q10 10 16 10 Q22 10 22 16 Q22 22 16 22" stroke="white" stroke-width="2.5"
                            stroke-linecap="round" fill="none" />
                        <circle cx="16" cy="14" r="2" fill="#818cf8" />
                    </svg>
                </div>
                <div>
                    <div class="nc-brand-name">NutriCare Pro</div>
                    <div class="nc-brand-sub">Studio di Nutrizione</div>
                </div>
            </a>

            <!-- Nav -->
            <nav class="nc-nav">
                <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }"
                    class="nc-nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    Home
                </a>
                <a routerLink="/nutricare" routerLinkActive="is-active" class="nc-nav-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                    </svg>
                    Scheda Paziente
                </a>
            </nav>

            <!-- Status pill -->
            <div class="nc-status-pill">
                <span class="nc-status-dot"></span>
                <span>Sistema attivo</span>
            </div>

        </div>
    </header>

    <!-- ══════════════════════════════════════════════════════════════════ -->
    <!-- MAIN                                                               -->
    <!-- ══════════════════════════════════════════════════════════════════ -->
    <main class="nc-main">
        <router-outlet></router-outlet>
    </main>

    <!-- ══════════════════════════════════════════════════════════════════ -->
    <!-- FOOTER                                                             -->
    <!-- ══════════════════════════════════════════════════════════════════ -->
    <footer class="nc-footer">
        <div class="nc-footer-inner">
            <div class="nc-footer-brand">
                <span class="nc-footer-dot"></span>
                <span><strong>NutriCare Pro</strong> &mdash; Sistema di raccolta dati nutrizionali</span>
            </div>
            <div class="nc-footer-meta">
                Powered by <strong>DynamicForm</strong> &middot; Angular 19 &middot; NgRx
            </div>
        </div>
    </footer>

</div>
