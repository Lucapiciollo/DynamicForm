 <form class="px-3 ">

     <ng-container  >
     
              <ng-template #ConfigForm let-configForm   [ngIf]="questions">
                   
                <div class="row my-2 containerForm px-2" #containerForm *ngIf=" configForm!=null"> 
                   
                        <ng-container *ngFor="let data  of configForm ;let formGroupIndex=index"
                       
                                    [ngTemplateOutlet]="  TypeForm "
                                    [ngTemplateOutletContext]="{  $implicit: data.formGroup ,formGroupIndex:formGroupIndex, group:data ,containerForm:containerForm, actions: data.actions||[]}">
                                    <div  *ngIf="data.title" class="title text-left my-3">{{data.title }}  </div>
                                   
                         </ng-container>
          
                 </div>    
            

               
              </ng-template>


              <ng-template #TypeForm let-typeForm let-formGroupIndex="formGroupIndex"    let-group="group" let-containerForm="containerForm" let-actions="actions">
                <div class="row" *ngIf="{isLast:false} as last">
                    <ng-container *ngFor="let data  of   typeForm ;let formActionIndex=index ; let last=last"
                                [ngTemplateOutlet]="  FormAction "
                                [ngTemplateOutletContext]="{  $implicit: data.formAction  ,formGroupIndex:formGroupIndex ,formActionIndex:formActionIndex, group:group.formGroup,containerForm:containerForm}">
                                <div class="subTitle my-2" *ngIf="data.formAction.title && data?.formAction?.typeControlForm==TYPE_CONTROL_FORM.GROUP"  >{{data.formAction.title }}</div>                        
                    </ng-container>
                     
                    
                    
                    <div class="row m-auto mb-3"  >
                        <div class="col-12 text-end">
                             <button mat-flat-button #button [class]="action.cssClassButton?.join(' ')" *ngFor="let action of actions"
                                   (click)="action.action(questions,group,formGroup,addForm.bind(this))"
                              >
                                <i #icon [class]="action.cssClassIcon?.join(' ')" aria-hidden="true">  </i>{{action.label}} 
                            </button>
                        </div>
                    </div>   
                     


                </div>
              </ng-template>


              <ng-template #FormAction let-formAction   let-formGroupIndex="formGroupIndex"   let-formActionIndex="formActionIndex"    let-group="group" let-containerForm="containerForm">
                  
                
                                                
  
                <ng-container  [ngTemplateOutlet]="ConfigForm"
                                 [ngTemplateOutletContext]="{  $implicit: formAction.formGroup }">
               
                                
                                <ng-container [ngSwitch]="formAction.typeControlForm" >
                                    <app-combo *ngSwitchCase="TYPE_CONTROL_FORM.COMBO"     [question]="formAction" [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-combo>
                                    <app-checkbox *ngSwitchCase="TYPE_CONTROL_FORM.CHECKBOX" [question]="formAction" [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-checkbox>
                                    <app-currency *ngSwitchCase="TYPE_CONTROL_FORM.CURRENCY"     [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-currency>
                                    <app-date *ngSwitchCase="TYPE_CONTROL_FORM.DATA"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-date>
                                    <app-date-range *ngSwitchCase="TYPE_CONTROL_FORM.DATARANGE"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-date-range>
                                    <app-input-text *ngSwitchCase="TYPE_CONTROL_FORM.TEXT"    [question]="formAction" [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-input-text>
                                    <app-date-time *ngSwitchCase="TYPE_CONTROL_FORM.DATETIME"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-date-time>
                                    <app-file *ngSwitchCase="TYPE_CONTROL_FORM.FILE"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-file>                              
                                    <app-input-time *ngSwitchCase="TYPE_CONTROL_FORM.TIME"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-input-time>
                                    <app-label *ngSwitchCase="TYPE_CONTROL_FORM.LABEL"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-label>
                                    <app-link *ngSwitchCase="TYPE_CONTROL_FORM.LINK"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-link>
                                    <app-number *ngSwitchCase="TYPE_CONTROL_FORM.NUMBER"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-number>
                                    <app-radiobutton *ngSwitchCase="TYPE_CONTROL_FORM.RADIOGROUP"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-radiobutton>
                                    <app-textarea *ngSwitchCase="TYPE_CONTROL_FORM.TEXTAREA"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-textarea>  
                                    <app-sort-action *ngSwitchCase="TYPE_CONTROL_FORM.SORTACTION"    [question]="formAction"  [formActionIndex]="formActionIndex" [formGroupIndex]="formGroupIndex" [group]="group" [allGroup]="questions"></app-sort-action>  

                                </ng-container>

                                
            
                  </ng-container>
 
                        
           </ng-template>
  
   
     </ng-container>

 

    </form>
