<ng-container *ngIf=" !control.formAction.css?.hide">
    <div *ngIf="!control.formAction.autocomplete">


        <mat-form-field class="w-100">
            <mat-label class="form-label" [class.disabled]="control.formAction.formControl.disabled">{{control.formAction.title}}</mat-label>
            <mat-select [formControl]="control.formAction?.formControl" [style.color]="control.formAction?.css?.font?.color ? control.formAction?.css?.font?.color :'black'" [multiple]="control.formAction?.multiple">
                <!-- <mat-option [value]=" null"  (click)="control.formAction.optionSelected ? control.formAction.optionSelected(  control.formAction.formName ,null) : null" >
          <span [class.disabled]="control.formAction.formControl.disabled"> </span>
        </mat-option> -->
                <mat-option *ngFor="let secondElement of control.formAction.options" class="" [value]=" secondElement.id " (click)="control.formAction.optionSelected ? control.formAction.optionSelected(  control.formAction.formName,secondElement  ) : null">
                    <span [class.disabled]="control.formAction.formControl.disabled"> {{secondElement.description}} </span>
                </mat-option>
            </mat-select>
            <mat-error *ngFor="let error of getErrorFormControl( control.formAction?.formControl )">{{error}} </mat-error>
        </mat-form-field>


    </div>



    <div *ngIf="control.formAction.autocomplete">
        <mat-form-field class="w-100">
            <mat-label class="form-label" [class.disabled]="control.formAction.formControl.disabled">{{control.formAction.title}}</mat-label>
            <input #inp [style.color]="control.formAction?.css?.font?.color ? control.formAction?.css?.font?.color :'black'" matInput [placeholder]="control.formAction.placeholder" [formControl]="filtercontrol" [matAutocomplete]="combo" />
            <button *ngIf="this.control.formAction.formControl.value!=null" matSuffix mat-icon-button aria-label="Clear" (click)="$event.stopPropagation();filtercontrol.setValue(null);this.control.formAction.formControl.setValue(null)">
                <mat-icon>close</mat-icon>
             </button>
            <mat-autocomplete #combo="matAutocomplete" autoActiveFirstOption="true" multiple>
                <mat-option #opt [style.color]="control.formAction.css?.font?.color ? control.formAction.css?.font?.color :'black'" (click)="optionSelected(control.formAction.formName ,option) ; control.formAction.optionSelected ? control.formAction.optionSelected(control.formAction.formName, control.formAction  ) : null"
                    *ngFor="let option of filteredOptions | async" [value]="option.id">
                    {{ option.description }}
                </mat-option>
            </mat-autocomplete>
            <mat-error *ngFor="let error of getErrorFormControl( control.formAction?.formControl )">{{error}} </mat-error>
        </mat-form-field>

    </div>



</ng-container>
