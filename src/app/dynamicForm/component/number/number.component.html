


@if(!control.formAction?.css?.hide) {
  <ng-container  >
  <div class="  d-flex w-100 ">
                     <mat-form-field  class="w-100 customMY" >
                        <mat-label class="form-label"   [class.disabled]="control.formAction.formControl.disabled">{{control.formAction.title}}
                          @if (control.formAction?.info) {
                            <mat-icon [matTooltip]="control.formAction?.info.msg" [style.color]="control.formAction?.info.color" class="mx-2" style="font-size:large">info_outline</mat-icon>
                          }                        
                        </mat-label>
                        <input  matInput type="number" [matTooltip]="control.formAction?.tipContent || null"
                                [style.color]="control.formAction?.css?.font?.color ? control.formAction?.css?.font?.color :'black'"
                                [formControl]="control.formAction?.formControl"
                                [class.disabled]="control.formAction.formControl.disabled"
                                [placeholder]="control.formAction.placeholder||''"
                                [min]="control.formAction?.optionNumber?.min"
                                [max]="control.formAction?.optionNumber?.max"
                                [step]="control.formAction?.optionNumber?.step"
                                >
                                @if(control.formAction?.resetButton){
                                  <button  matSuffix mat-icon-button aria-label="Clear" (click)="$event.stopPropagation();control.formAction.formControl.reset()" >
                                   <mat-icon>close</mat-icon>
                                 </button>
                               }
                              </mat-form-field>

                              <div #dynamicContainer class ="px-1"></div>
                            </div>
                          @for (error of getErrorFormControl( control.formAction?.formControl ) ; track error ) {
                              <mat-error>{{error}} </mat-error>
                           }
 </ng-container>
}
