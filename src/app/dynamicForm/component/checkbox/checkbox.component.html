<!-- @format -->

@if (!control.formAction?.css?.hide) {
   <ng-container>
      <div class="row customMY w-auto">
         <div [class]="control?.formAction?.css?.classRadio">
            <mat-checkbox
               class="display-contents"
               [matTooltip]="control.formAction?.tipContent || null"
               [class.disabled]="control.formAction.formControl.disabled"
               [formControl]="$any(control.formAction?.formControl)"
               (focus)="emitFocus()"
               (blur)="emitBlur()">

               {{ control.formAction.title }}

            </mat-checkbox>

            @if (control.formAction?.info) {
               <mat-icon
                  [matTooltip]="control.formAction?.info.msg"
                  [style.color]="control.formAction?.info.color"
                  class="mx-1 pt-2 p-1"
                  style="font-size: small">
                  info_outline
               </mat-icon>
            }
         </div>

         @for (error of getErrorFormControl($any(control.formAction?.formControl)); track error) {
            <mat-error>{{ error }}</mat-error>
         }

         <div #dynamicContainer class=""></div>
      </div>
   </ng-container>
}
