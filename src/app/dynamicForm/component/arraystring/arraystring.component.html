@if(!control.formAction?.css?.hide) {
  <ng-container  >
    <div class="  d-flex w-100 ">
      <mat-form-field class="w-100 customMY ">

        <mat-label class="form-label" [class.disabled]="control.formAction.formControl.disabled">{{control.formAction.title}}
          @if (control.formAction?.info) {
            <mat-icon [matTooltip]="control.formAction?.info.msg" [style.color]="control.formAction?.info.color" class="mx-2" style="font-size:large">info_outline</mat-icon>
          }
        </mat-label>

        <mat-chip-grid #chipGrid>
          @for (option of getList() ; track option ) {
            <mat-chip-row (removed)="remove(option )" [editable]="!control.formAction.formControl.disabled" class="p-0 m-0 b-none" style="background-color: transparent;">
              {{option }}
              <button matChipRemove [attr.aria-label]="'remove ' + option ">
                <mat-icon>cancel</mat-icon>
              </button>
            </mat-chip-row>
          }
          <input placeholder="Email..." [matChipInputFor]="chipGrid" [matChipInputSeparatorKeyCodes]="separatorKeysCodes" [matChipInputAddOnBlur]="addOnBlur" (matChipInputTokenEnd)="add($event)" />
        </mat-chip-grid>
      </mat-form-field>
      @for (error of getErrorFormControl( control.formAction?.formControl ) ; track error ) {
        <mat-error>{{error}} </mat-error>
      }
    </div>

  </ng-container>
}
